<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planogram Viewer - Ultimate Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root{
            --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;
            --border:#2a2a2a;--text:#e8e8e8;--text2:#888;
            --accent:#ff4e1a;--yellow:#f59e0b;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:20px;}
        .container{max-width:1100px;margin:auto;}
        .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:25px;margin-bottom:20px;}
        .form-row{display:grid;grid-template-columns:1fr 1fr auto;gap:15px;align-items:end;}
        input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:#fff;font-family:var(--mono);outline:none;}
        label{display:block;font-size:10px;color:var(--text2);margin-bottom:8px;font-family:var(--mono);letter-spacing:1px;}
        .btn{background:var(--accent);color:#fff;border:none;padding:12px 25px;border-radius:8px;font-weight:700;cursor:pointer;transition:0.3s;}
        .btn:hover{opacity:0.8;}
        .table-container{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
        table{width:100%;border-collapse:collapse;font-size:13px;}
        th{text-align:left;padding:12px;background:var(--bg3);color:var(--text2);font-family:var(--mono);font-size:10px;border-bottom:1px solid var(--border);}
        td{padding:12px;border-bottom:1px solid var(--border);white-space:nowrap;}
        .price-tag{color:var(--yellow);font-family:var(--mono);font-weight:700;text-align:right;}
        .rack-tag{color:var(--accent);font-family:var(--mono);font-weight:600;}
        .hidden{display:none;}
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="form-row">
            <div>
                <label>KODE TOKO</label>
                <input type="text" id="storeId" value="N497">
            </div>
            <div>
                <label>RAK (CONTOH: JA1)</label>
                <input type="text" id="rack" placeholder="Kosongkan untuk semua">
            </div>
            <button class="btn" id="fetchBtn">Tampilkan</button>
        </div>
    </div>

    <div id="mainView" class="hidden">
        <div class="table-container">
            <div style="padding:15px; background:var(--bg3); display:flex; justify-content:space-between; align-items:center;">
                <input type="text" id="search" placeholder="Cari PLU atau Nama..." style="width:250px; padding:8px;">
                <button id="exportBtn" style="background:none; border:1px solid var(--border); color:var(--text2); padding:6px 15px; cursor:pointer; border-radius:6px; font-size:12px;">Export Excel</button>
            </div>
            <div style="overflow-x:auto; max-height:600px;">
                <table>
                    <thead>
                        <tr>
                            <th>PLU</th>
                            <th>NAMA BARANG</th>
                            <th>RAK</th>
                            <th>BARCODE</th>
                            <th style="text-align:right">HARGA</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let allData = [];
    const fmt = new Intl.NumberFormat('id-ID');

    document.getElementById('fetchBtn').onclick = async function() {
        const sId = document.getElementById('storeId').value.trim().toUpperCase();
        const rk = document.getElementById('rack').value.trim().toUpperCase();
        
        this.textContent = 'Memuat...';
        this.disabled = true;
        
        try {
            const resp = await fetch(`/proxy-products?storeId=${sId}&rack=${rk}`);
            const result = await resp.json();
            
            // Log ke console untuk investigasi jika masih gagal
            console.log("Raw API Response:", result);

            // Normalisasi data (mengambil array di mana pun ia berada)
            if (Array.isArray(result)) {
                allData = result;
            } else {
                allData = result.data || result.product_list || result.list || [];
            }

            if(allData.length > 0) {
                document.getElementById('mainView').classList.remove('hidden');
                renderTable();
            } else {
                alert("Data tidak ditemukan.");
            }
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            this.textContent = 'Tampilkan';
            this.disabled = false;
        }
    };

   function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const tbody = document.getElementById('tbody');
    
    const filtered = allData.filter(i => 
        (i.descp || "").toLowerCase().includes(q) || 
        (i.plu || i.plu_code || "").toString().includes(q)
    );

    tbody.innerHTML = filtered.map(item => {
        // Ambil PLU & Barcode (Sudah benar di screenshot kamu)
        const plu = item.plu || item.plu_code || "-";
        const barcode = item.barcode || item.bar_code || "-";
        const rak = item.planogram || item.rack || item.rack_id || "-";
        
        // --- LOGIKA PENYELAMAT HARGA ---
        // Kita cek semua kemungkinan field harga yang ada di API Alfamart
        let hargaRaw = 0;
        
        if (item.price && item.price != 0) hargaRaw = item.price;
        else if (item.price_sell && item.price_sell != 0) hargaRaw = item.price_sell;
        else if (item.price_sale && item.price_sale != 0) hargaRaw = item.price_sale;
        else if (item.salesPrice && item.salesPrice != 0) hargaRaw = item.salesPrice;
        else if (item.member_price && item.member_price != 0) hargaRaw = item.member_price;
        
        return `
            <tr>
                <td>${plu}</td>
                <td>${item.descp || '-'}</td>
                <td style="color:#ff4e1a; font-weight:bold;">${rak}</td>
                <td>${barcode}</td>
                <td style="color:#f59e0b; font-weight:bold; text-align:right;">
                    ${hargaRaw > 0 ? fmt.format(hargaRaw) : '<span style="color:#444">N/A</span>'}
                </td>
            </tr>
        `;
    }).join('');
}

    document.getElementById('search').oninput = renderTable;

    document.getElementById('exportBtn').onclick = function() {
        if(allData.length === 0) return;
        const ws = XLSX.utils.json_to_sheet(allData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Planogram_Export.xlsx");
    };
</script>
</body>
</html>

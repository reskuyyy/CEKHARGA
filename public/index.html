<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planogram Viewer v2</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;
  --border:#2a2a2a;--border2:#333;--text:#e8e8e8;--text2:#888;--text3:#555;
  --accent:#ff4e1a;--green:#22c55e;--yellow:#f59e0b;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:12px;position:sticky;top:0;z-index:10;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
.container{max-width:1100px;margin:0 auto;padding:24px;}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end;}
.field label{display:block;font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:6px;text-transform:uppercase;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--mono);outline:none;}
.field input:focus{border-color:var(--accent);}
.btn-fetch{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 24px;font-weight:600;cursor:pointer;height:38px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.stat-val{font-size:20px;font-weight:700;}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.table-toolbar{display:flex;justify-content:space-between;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);}
.search-input{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text);width:220px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--bg3);color:var(--text3);font-family:var(--mono);font-size:10px;padding:10px 12px;text-align:left;cursor:pointer;position:sticky;top:0;}
thead th.active{color:var(--accent);}
td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
td.rack{color:var(--accent);font-family:var(--mono);font-size:11px;}
td.price{color:var(--yellow);font-family:var(--mono);font-weight:600;text-align:right;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo-dot"></div>
  <div class="logo-text">Planogram Viewer <span style="font-size:10px; color:var(--text3)">API FIXED</span></div>
</div>
<div class="container">
  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>KODE TOKO</label>
        <input type="text" id="storeId" value="N497">
      </div>
      <div class="field">
        <label>RAK</label>
        <input type="text" id="filterRak" value="AU1">
      </div>
      <button class="btn-fetch" id="fetchBtn">Tampilkan</button>
    </div>
  </div>

  <div id="statsEl" class="stats hidden">
    <div class="stat-card">
        <div style="font-size:10px;color:var(--text3)">STORE</div>
        <div class="stat-val" id="s-store" style="color:var(--accent)">-</div>
    </div>
    <div class="stat-card">
        <div style="font-size:10px;color:var(--text3)">TOTAL ITEM</div>
        <div class="stat-val" id="s-total">-</div>
    </div>
  </div>

  <div id="tableCard" class="table-card hidden">
    <div class="table-toolbar">
      <input type="text" class="search-input" id="search" placeholder="Cari barang...">
      <button id="exportBtn" style="background:none; border:1px solid var(--border2); color:var(--text2); cursor:pointer; padding:5px 10px; border-radius:5px">Export Excel</button>
    </div>
    <div style="overflow-x:auto; max-height:500px;">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('plu')" id="th-plu">PLU</th>
            <th onclick="sortBy('descp')" id="th-descp">NAMA BARANG</th>
            <th onclick="sortBy('planogram')" id="th-planogram">PLANOGRAM</th>
            <th onclick="sortBy('barcode')" id="th-barcode">BARCODE</th>
            <th onclick="sortBy('price')" id="th-price" style="text-align:right">PRICE</th>
            <th style="text-align:right">SUBDEPT</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let allData = [], sortKey = 'planogram', sortDir = 1;
const formatter = new Intl.NumberFormat('id-ID');

document.getElementById('fetchBtn').onclick = async function() {
    const storeId = document.getElementById('storeId').value.toUpperCase();
    const rack = document.getElementById('filterRak').value.toUpperCase();
    this.textContent = 'Memuat...';
    
    try {
        const r = await fetch(`/proxy-products?storeId=${storeId}&rack=${rack}`);
        const data = await r.json();
        
        allData = Array.isArray(data) ? data : [];
        if(allData.length === 0) alert('Data tidak ditemukan');

        document.getElementById('statsEl').classList.remove('hidden');
        document.getElementById('tableCard').classList.remove('hidden');
        document.getElementById('s-store').textContent = storeId;
        document.getElementById('s-total').textContent = allData.length;
        
        renderTable();
    } catch (e) {
        alert('Gagal mengambil data: ' + e.message);
    } finally {
        this.textContent = 'Tampilkan';
    }
};

function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const tbody = document.getElementById('tbody');
    
    let filtered = allData.filter(item => 
        item.descp.toLowerCase().includes(q) || item.plu.toString().includes(q)
    );

    filtered.sort((a, b) => {
        let valA = a[sortKey], valB = b[sortKey];
        return (valA < valB ? -1 : 1) * sortDir;
    });

    tbody.innerHTML = filtered.map(r => `
        <tr>
            <td style="font-family:var(--mono)">${Math.round(r.plu)}</td>
            <td>${r.descp}</td>
            <td class="rack">${r.planogram || '-'}</td>
            <td style="font-family:var(--mono)">${r.barcode || '-'}</td>
            <td class="price">${formatter.format(r.price || 0)}</td>
            <td style="text-align:right; font-family:var(--mono)">${r.subdept}</td>
        </tr>
    `).join('');

    // Update Header sorting active class
    ['plu','descp','planogram','barcode','price'].forEach(k => {
        const el = document.getElementById('th-' + k);
        if(el) el.className = k === sortKey ? 'active' : '';
    });
}

function sortBy(key) {
    if (sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = 1; }
    renderTable();
}

document.getElementById('search').oninput = renderTable;

document.getElementById('exportBtn').onclick = function() {
    const ws = XLSX.utils.json_to_sheet(allData.map(r => ({
        PLU: r.plu, Barang: r.descp, Rak: r.planogram, Harga: r.price
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "Planogram.xlsx");
};
</script>
</body>
</html>
